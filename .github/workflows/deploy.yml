name: Deploy
on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Needed for auth with Deno Deploy
      contents: read # Needed to clone the repository

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache jampack
        uses: actions/cache@v4
        with:
          path: .jampack/cache
          key: jampack-${{ runner.os }}-${{ hashFiles('public/**', 'src/content/**') }}
          restore-keys: |
            jampack-${{ runner.os }}-

      - name: Build step
        run: "deno task deploy-build"

      - name: Upload to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "ianbull-toro-36"
          entrypoint: "entry.mjs"
          root: "dist"
